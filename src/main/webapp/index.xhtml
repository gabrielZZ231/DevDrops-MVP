<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core">

<head>
    <title>DevDrops</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>

<body>
<f:view>
<div class="container py-4">

    <h:messages globalOnly="true"
                errorClass="alert alert-danger"
                infoClass="alert alert-success"
                warnClass="alert alert-warning"
                fatalClass="alert alert-danger" />

    <div class="mb-4">
        <h1 class="h3">DevDrops</h1>
        <p class="text-muted mb-0">Compartilhe conhecimento técnico em drops curtos.</p>
    </div>

    <div class="card mb-4">
        <div class="card-body">

            <h:form>
                <div class="mb-3">
                    <h:outputLabel for="titulo" value="Título" styleClass="form-label" />
                    <h:inputText id="titulo" value="#{dropBean.drop.titulo}" styleClass="form-control" required="true" />
                </div>

                <div class="mb-3">
                    <h:outputLabel for="conteudo" value="Conteúdo" styleClass="form-label" />
                    <h:inputTextarea id="conteudo" value="#{dropBean.drop.conteudo}" styleClass="form-control" rows="5" required="true" />
                </div>

                <h:commandButton value="Publicar" action="#{dropBean.salvar}" styleClass="btn btn-primary" />
            </h:form>

        </div>
    </div>

    <h:dataTable value="#{dropBean.drops}" var="d" styleClass="table table-striped table-bordered">
        <h:column>
            <f:facet name="header">Título</f:facet>
            <h:outputText value="#{d.titulo}" />
        </h:column>

        <h:column>
            <f:facet name="header">Conteúdo</f:facet>
            <h:outputText value="#{d.conteudo}" />
        </h:column>

        <h:column>
            <f:facet name="header">Publicado em</f:facet>
            <h:outputText value="#{d.dataPublicacao}">
                <f:convertDateTime pattern="dd/MM/yyyy HH:mm" timeZone="America/Sao_Paulo" />
            </h:outputText>
        </h:column>
    </h:dataTable>

</div>
</f:view>
</body>

</html>
