name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Legacy compatibility checks
        run: bash scripts/verify-legacy-compat.sh

      - name: Build WAR
        run: mvn -B -DskipTests package

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: devdrops-war
          path: target/*.war
          if-no-files-found: error
